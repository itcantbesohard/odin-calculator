<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js" defer></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Calculator Online</title>
</head>

<body>
    <header>
        <h1>Calculator Online</h1>
        <h2>Using HTML, CSS and JavaScript</h2>
    </header>

    <div class="calculator">
        <div class="display">
            <p>0123456789.89</p>
        </div>
        <div class="buttons">
            <button class="btn btn-func" id="AC">AC</button>
            <button class="btn btn-func" id="CE">CE</button>
            <button class="btn btn-func btn-operate" id="dot">.</button>
            <button class="btn btn-func btn-operate" id="divide">/</button>
            <button class="btn" id="7">7</button>
            <button class="btn" id="8">8</button>
            <button class="btn" id="9">9</button>
            <button class="btn btn-func btn-operate" id="multiple">*</button>
            <button class="btn" id="4">4</button>
            <button class="btn" id="5">5</button>
            <button class="btn" id="6">6</button>
            <button class="btn btn-func btn-operate" id="subtract">-</button>
            <button class="btn" id="1">1</button>
            <button class="btn" id="2">2</button>
            <button class="btn" id="3">3</button>
            <button class="btn btn-func btn-operate" id="add">+</button>
            <button class="btn" id="percent">%</button>
            <button class="btn" id="0">0</button>
            <button class="btn btn-func btn-operate" id="calculate">=</button>
        </div>

    </div>

    <footer>
        <p>Made by Michał Baran thanks to The Odin Project</p>
    </footer>

</body>

</html>
