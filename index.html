<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js" defer type="module"></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Calculator Online</title>
</head>

<body>
    <header>
        <h1>Calculator Online</h1>
        <h2>Using HTML, CSS and JavaScript</h2>
    </header>

    <div class="calculator">
        <div class="display">
            <p>0123456789.89</p>
        </div>
        <div class="buttons">
            <button class="btn btn-func" data-action="AC">AC</button>
            <button class="btn btn-func" data-action="CE">CE</button>
            <button class="btn btn-func" data-action="decimal">.</button>
            <button class="btn btn-func" data-operator="divide">/</button>
            <button class="btn" data-number="7">7</button>
            <button class="btn" data-number="8">8</button>
            <button class="btn" data-number="9">9</button>
            <button class="btn btn-func" data-operator="multiple">*</button>
            <button class="btn" data-number="4">4</button>
            <button class="btn" data-number="5">5</button>
            <button class="btn" data-number="6">6</button>
            <button class="btn btn-func" data-operator="subtract">-</button>
            <button class="btn" data-number="1">1</button>
            <button class="btn" data-number="2">2</button>
            <button class="btn" data-number="3">3</button>
            <button class="btn btn-func" data-operator="add">+</button>
            <button class="btn" data-action="percent">%</button>
            <button class="btn" data-number="0">0</button>
            <button class="btn btn-func" data-action="equals" id="equals">=</button>
        </div>

    </div>

    <footer>
        <p>Made by Michał Baran thanks to The Odin Project</p>
    </footer>

</body>

</html>
